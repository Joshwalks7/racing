		<meta property="og:title" content="UnderGrad" />
		<meta property="og:description" content="We run - by students, for students, with students." />

			property="og:image"
			content="https://web-design-development-society.github.io/racing/images/ug.png"
		/>
		<meta property="og:url" content="https://web-design-development-society.github.io/racing" />

		<link rel="icon" type="image/png" href="./images/ug.png" />

		<link rel="stylesheet" href="./styles/pages/events.css" />

	<body>
		<header>
			<!-- Header inserts dynamically -->
		</header>
		<!-- Start of unique content -->
		<div id="hero-container">
			<h1>Events</h1>
			<img id="event-hero" src="images/event-hero.png" alt="Events Hero Image" />
		</div>
		<div id="weekly-run-wrapper">
			<div id="weekly-run" class="item-box">
				<div class="weekly-run-container">
						<h2>Weekly Run Club</h2>
						<p>Come have fun in the run, in the sun and snow...</p>
					
					<div class="weekly-info-container">
						<div class="weekly-titles">
							<h3>Time:</h3>
							<h3>Location:</h3>
							<h3>Chat:</h3>
						</div>
						<div class="weekly-data">
							<h3>6:00 PM</h3>
							<h3><a class="weekly-a" href="https://maps.app.goo.gl/KcNSr1Czz1BUza8X7"         target="_blank" rel="noopener noreferrer">Subway Circle</a></h3>
							<h3><a class="weekly-a" href="https://groupme.com/join_group/104165910/Xp9tyTUM" target="_blank" rel="noopener noreferrer">GroupMe</a></h3>
						</div>
					</div>
				</div>
			</div>
			<iframe
				src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d557.1568923287167!2d-111.78913924130116!3d43.81793173925394!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sus!4v1771461257768!5m2!1sen!2sus"
				width="600"
				height="318px"
				style="
					display: block;
					border: 0;
					margin: 0 auto;
					border-radius: 20px;
					border: 4px solid var(--text-on-dark);
					background-color: white;
				"
				allowfullscreen="false"
				loading="lazy"
				referrerpolicy="no-referrer-when-downgrade"
			></iframe>
		</div>
		<div class="item-box next-race">
			<h1>Join Our Next Race!</h1>
			<p>Click the link below to see the details and sign up for our next race!</p>
			<a href="https://runsignup.com/Race/ID/Rexburg/UndergradSpring2026?utm_source=platform_find_a_race&utm_medium=referral">Sign Up!</a>
		</div>

		<footer>
			<!-- Footer inserts dynamically -->
		</footer>
