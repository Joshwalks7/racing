<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="title" content="UnderGrad" />
		<meta
			name="description"
			content="We run - by students, for students, with students. Join us for weekly runs, monthly activities, and racing events with rewards."
		/>
		<meta property="og:title" content="UnderGrad" />
		<meta property="og:description" content="We run - by students, for students, with students." />
		<!-- TODO - After the site starts using a domain, update these two links -->
		<meta
			property="og:image"
			content="https://web-design-development-society.github.io/racing/images/ug.png"/>
		<meta property="og:url" content="https://web-design-development-society.github.io/racing" />
		<meta property="og:type" content="website" />
		<link rel="icon" type="image/png" href="./images/ug.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="styles/main.css" />
		<link rel="stylesheet" href="styles/pages/gallery.css" />
		<script type="module" src="./scripts/main.js" defer></script>
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
		/>
		<title>UnderGrad - Gallery</title>
	</head>
	<body>
		<header></header>
		<section id="main-column">
			<div id="gallery-heading">
				<h1>Check out the best moments from our latest races!</h1>
			</div>
			<div id="gallery-box">
				<img
					class="gallery-photo"
					src="images/gallery/cool_finish.png"
					alt="pink shirt guy finishes"
				/>
				<img 
					class="gallery-photo" 
					src="images/gallery/duo_medals.png" 
					alt="two guys with medals" />
				<img
					class="gallery-photo"
					src="images/gallery/finish_signs.png"
					alt="group holding signs"
				/>
				<img
					class="gallery-photo"
					src="images/gallery/finish_w_kid.png"
					alt="woman and girl finish"
				/>
				<img
					class="gallery-photo"
					src="images/gallery/four_finish.png"
					alt="four people finishing together"
				/>
				<img 
					class="gallery-photo" 
					src="images/gallery/group_pose.png" 
					alt="young adults photo" />
				<img
					class="gallery-photo"
					src="images/gallery/happy_medals.png"
					alt="happy people on the winners' podium"
				/>
				<img
					class="gallery-photo"
					src="images/gallery/two_finish.png"
					alt="two people finishing together"
				/>
				<img
					class="gallery-photo"
					src="images/gallery/running_group.png"
					alt="people running in a group but closer"
				/>
				<img
					class="gallery-photo"
					src="images/gallery/running_group_2.png"
					alt="people running in a group"
				/>
				<img
					class="gallery-photo"
					src="images/gallery/racing_tent.png"
					alt="officials waiting at the finish with medals"
				/>
				<img
					class="gallery-photo"
					src="images/gallery/scholarship_prize.png"
					alt="girl holding a comically large check for scholarship"
				/>
			</div>
		</section>
		<footer></footer>
	</body>
</html>
